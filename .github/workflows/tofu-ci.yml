name: tofu-ci

# Calls the shared reusable OpenTofu fmt + validate gate — the SSOT in thorvath-slower/ci-workflows
# (CZID-310), paired with security.yml. fmt-checks infra/ and validates each foundation root stack with
# -backend=false (pure correctness; no cloud creds / remote state). setup-opentofu@v2 is in the reusable.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tofu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tofu-ci:
    uses: thorvath-slower/ci-workflows/.github/workflows/tofu-ci.yml@v1
    with:
      fmt_path: infra/
      stacks: |
        infra/state-foundation/bootstrap
        infra/state-foundation/foundation
        infra/state-foundation/consumers/seqtoid-web
