name: terraform-ci

# Thin caller: the foundation IaC correctness gate now comes from the SSOT reusable
# (thorvath-slower/seqtoid-ci-workflows) pinned to @v1 — one definition, updated once, used everywhere.
# Terraform version is read from this repo's .terraform-version (SSOT-by-file, via terraform_version_file).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-ci:
    uses: thorvath-slower/seqtoid-ci-workflows/.github/workflows/terraform-ci.yml@v1
    with:
      fmt_path: infra/
      stacks: |
        infra/state-foundation/bootstrap
        infra/state-foundation/foundation
        infra/state-foundation/consumers/seqtoid-web
